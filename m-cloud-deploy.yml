---
- name: M-Cloud Otomatik Makine Provisioning
  hosts: all
  gather_facts: no
  become: true  # Ana makinede yetkili işlem yapmak için
  vars:
    base_port: 31001
    u_choice: "{{ user_choice | default('light_container') }}"
    s_adi: "{{ site_adi | default('m-cloud-v1') }}"

  tasks:
    - name: Mevcut Docker sayisini al
      shell: "docker ps -a --filter name=m-cloud- -q | wc -l"
      register: docker_count
      changed_when: false

    - name: Port Hesapla
      set_fact:
        assigned_port: "{{ (base_port | int) + (docker_count.stdout | trim | int) }}"

    - name: Docker Kurulumu
      when: u_choice == 'light_container'
      shell: |
        docker run -d \
          --name "m-cloud-{{ s_adi }}" \
          --restart always \
          -p {{ assigned_port }}:7681 \
          tsl0922/ttyd:latest ttyd -p 7681 login
