---
- name: M-Cloud Otomatik Makine Provisioning
  hosts: localhost
  connection: local
  gather_facts: no
  vars:
    base_port: 31001

  tasks:
    # ... (diğer tasklar aynı kalıyor)

    - name: Light Paket - Docker Terminal Baslat
      when: user_choice == 'light_container'
      # BURASI DEĞİŞTİ: 'docker_container' yerine 'community.docker.docker_container'
      community.docker.docker_container:
        name: "m-cloud-{{ site_adi }}"
        image: "tsl0922/ttyd:latest"
        command: "ttyd -p 7681 login"
        ports:
          - "{{ assigned_port }}:7681"
        restart_policy: always
        state: started
